<script>
    // ⚠️ 在这里填入你的 Worker API 地址
    const WORKER_URL = "https://你的worker域名.workers.dev"; 

    // 你的图片池数组 IMAGE_POOL 和 IMG_BASE_PATH 保持不变，粘贴回这里
    
    let currentSelection = new Set(); 
    let currentRenderedImages = [];   
    
    window.onload = function() { initCaptcha(); };

    function isCorrectImage(filename) {
        const namePart = filename.substring(0, filename.lastIndexOf('.'));
        if (namePart.length < 2) return false;
        return namePart.charAt(namePart.length - 2) === '0';
    }

    function initCaptcha() {
        // ... (你原本洗牌和渲染图片的逻辑原封不动粘贴回这里) ...
    }
    
    function shuffleArray(array) { /* 原封不动 */ }
    function toggleSelect(element, index) { /* 原封不动 */ }

    async function verifyAndUnlock() {
        const passwordField = document.getElementById('password-input');
        const password = passwordField.value;
        const msg = document.getElementById('status-msg');
        
        if (!password) { alert("❌ 请输入密码！"); return; }

        let isCaptchaValid = true;
        currentSelection.forEach(index => { if (!isCorrectImage(currentRenderedImages[index])) isCaptchaValid = false; });
        currentRenderedImages.forEach((img, index) => { if (isCorrectImage(img) && !currentSelection.has(index)) isCaptchaValid = false; });

        if (!isCaptchaValid) {
            alert("❌ 图片验证失败！\n请仔细辨认黄前部长。");
            msg.textContent = "验证失败";
            msg.style.visibility = 'visible';
            setTimeout(initCaptcha, 1000); 
            return;
        }

        try {
            const res = await fetch(WORKER_URL + '/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password })
            });

            const data = await res.json();

            if (data.success) {
                alert("✅ 验证成功！ \n【必读】 \n请复制生成的一次性链接导入代理软件，该链接下载一次后即刻销毁。");
                const mockData = [{ title: "阅后即焚专属节点", url: data.link }];
                showDashboard(mockData);
            } else {
                alert("❌ " + data.error);
                msg.textContent = "口令错误";
                msg.style.visibility = 'visible';
                passwordField.value = '';
                initCaptcha();
            }
        } catch (e) {
            alert("❌ 网络请求失败！请检查 Worker 接口是否被墙。");
        }
    }

    function showDashboard(data) { /* 原封不动 */ }

</script>
